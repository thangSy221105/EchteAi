seed: 42
device: auto

dataset:
  train_images: /content/seadronessee/images/train
  train_annotations: /content/seadronessee/annotations/instances_train.json
  val_images: /content/seadronessee/images/val
  val_annotations: /content/seadronessee/annotations/instances_val.json
  # Official test labels are withheld. Use validation for local metrics/benchmark.
  test_images: /content/seadronessee/images/val
  test_annotations: /content/seadronessee/annotations/instances_val.json
  ignore_category_ids: [0]
  num_classes: 6
  workers: 2

augmentation:
  horizontal_flip_probability: 0.5
  brightness: 0.1
  contrast: 0.1
  saturation: 0.05
  hue: 0.02
  tiling:
    enabled: true
    tile_size: 960
    overlap: 0.25
    keep_empty_probability: 0.10
    min_visible_fraction: 0.50

inference:
  tiling:
    tile_size: 960
    overlap: 0.25
    batch_size: 1
    score_threshold: 0.05
    nms_threshold: 0.50
    max_detections: 300

validation:
  # Use the same overlap/merge path used at deployment when selecting best checkpoints.
  tiled: true

model:
  backbone: convnext_tiny
  pretrained_backbone: true
  trainable_backbone_layers: 4
  fpn_out_channels: 256
  # Safe default for a Colab T4 (15 GB). A100 users can try [1024, 1280], max 2048.
  min_size: 960
  train_min_sizes: [800, 896, 960]
  max_size: 1600
  # Deterministic 1D k-means on resized training bbox sqrt-areas.
  anchor_sizes: auto
  anchor_statistics_min_size: 960
  # Gamma still focuses hard examples; no alpha reweighting prevents suppressing foreground.
  focal_alpha: null
  aspect_ratios: [0.5, 1.0, 2.0]
  rpn_pre_nms_top_n_train: 2000
  rpn_pre_nms_top_n_test: 1000
  rpn_post_nms_top_n_train: 1000
  rpn_post_nms_top_n_test: 1000

training:
  batch_size: 2
  fp32_batch_size: 2
  qat_batch_size: 1
  fp32_epochs: 30
  qat_epochs: 11
  pt2e_qat_epochs: 3
  optimizer: adamw
  fp32_lr: 0.0001
  qat_lr: 0.00001
  weight_decay: 0.0001
  lr_step_size: 10
  lr_gamma: 0.1
  grad_clip_norm: 10.0
  warmup_iterations: 1000
  print_frequency: 50
  epoch_benchmark_images: 100

quantization:
  variant: M3
  backend: auto
  calibration_images: 512
  weight_only_warmup_epochs: 2
  observer_freeze_epochs: 3
  pt2e:
    # Start with backbone; change to backbone_fpn for the second ablation.
    region: backbone
    observer_warmup_epochs: 1
    observer_freeze_epochs: 1
    example_batch_size: 2
    maximum_batch_size: 2
    minimum_image_side: 256
    maximum_image_side: 1600
    # Small representative tensors keep export cheap; H/W remain dynamic.
    example_height: 256
    example_width: 320
  phase_learning_rates:
    weight_only: 0.0001
    full: 0.00005
    frozen: 0.00001
  variant_modules:
    M0: []
    M1: [backbone.convnext]
    M2: [backbone.convnext, backbone.fpn]
    M3: [backbone.convnext, backbone.fpn, rpn.shared_conv, rpn.classification]
    M4: [backbone.convnext, backbone.fpn, rpn.shared_conv, rpn.classification, rpn.bbox]
  quantized_modules:
    - backbone.convnext
    - backbone.fpn
    - rpn.shared_conv
    - rpn.classification
  fp32_modules:
    - transform
    - convnext.layernorm_gelu_residual
    - anchor_generator
    - rpn.bbox_decoder_nms
    - rpn.bbox_branch
    - roi_align
    - roi_heads
    - final_decode_nms

output:
  directory: /content/drive/MyDrive/EchteAI/seadronessee_m3
  fp32_best: /content/drive/MyDrive/EchteAI/seadronessee_m3/fp32_best.pt
  fp32_last: /content/drive/MyDrive/EchteAI/seadronessee_m3/fp32_last.pt
  qat_best: /content/drive/MyDrive/EchteAI/seadronessee_m3/qat_best.pt
  qat_last: /content/drive/MyDrive/EchteAI/seadronessee_m3/qat_last.pt
  int8_model: /content/drive/MyDrive/EchteAI/seadronessee_m3/selective_int8.pt
  evaluation_json: /content/drive/MyDrive/EchteAI/seadronessee_m3/evaluation.json
  benchmark_json: /content/drive/MyDrive/EchteAI/seadronessee_m3/benchmark.json
  epoch_benchmarks: /content/drive/MyDrive/EchteAI/seadronessee_m3/epoch_benchmarks.json
  pt2e_qat_best: /content/drive/MyDrive/EchteAI/seadronessee_m3/pt2e_qat_best.pt
  pt2e_qat_last: /content/drive/MyDrive/EchteAI/seadronessee_m3/pt2e_qat_last.pt
  pt2e_benchmark_json: /content/drive/MyDrive/EchteAI/seadronessee_m3/pt2e_benchmark.json
  pt2e_int8_model: /content/drive/MyDrive/EchteAI/seadronessee_m3/pt2e_int8.pt
  pt2e_int8_evaluation: /content/drive/MyDrive/EchteAI/seadronessee_m3/pt2e_int8_evaluation.json

benchmark:
  warmup_iterations: 10
  iterations: 50
  num_threads: 1
