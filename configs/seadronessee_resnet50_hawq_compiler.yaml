seed: 42
device: auto

dataset:
  train_images: /content/seadronessee/images/train
  train_annotations: /content/seadronessee/annotations/instances_train.json
  val_images: /content/seadronessee/images/val
  val_annotations: /content/seadronessee/annotations/instances_val.json
  test_images: /content/seadronessee/images/val
  test_annotations: /content/seadronessee/annotations/instances_val.json
  ignore_category_ids: [0]
  num_classes: 6
  binary_collapse_foreground: false
  workers: 2

augmentation:
  horizontal_flip_probability: 0.5
  brightness: 0.1
  contrast: 0.1
  saturation: 0.05
  hue: 0.02

validation: {}

model:
  backbone: resnet50
  pretrained_backbone: true
  trainable_backbone_layers: 5
  fpn_out_channels: 256
  min_size: 960
  train_min_sizes: [800, 896, 960]
  max_size: 1600
  anchor_sizes: auto
  anchor_statistics_min_size: 960
  focal_alpha: null
  aspect_ratios: [0.5, 1.0, 2.0]
  rpn_pre_nms_top_n_train: 2000
  rpn_pre_nms_top_n_test: 1000
  rpn_post_nms_top_n_train: 1000
  rpn_post_nms_top_n_test: 1000

training:
  batch_size: 2
  fp32_batch_size: 2
  qat_batch_size: 2
  fp32_epochs: 30
  qat_epochs: 11
  optimizer: adamw
  fp32_lr: 0.0001
  qat_lr: 0.00001
  weight_decay: 0.0001
  lr_step_size: 10
  lr_gamma: 0.1
  grad_clip_norm: 10.0
  warmup_iterations: 1000
  print_frequency: 50
  epoch_benchmark_images: 100

quantization:
  variant: M3
  backend: auto
  calibration_images: 512
  weight_only_warmup_epochs: 2
  observer_freeze_epochs: 3
  mixed_precision:
    enabled: true
    scope: backbone
    candidate_weight_bits: [4, 8]
    activation_bits: 8
    target_average_weight_bits: 6.0
    sensitivity_batches: 8
    policy_path:
    policy_output: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/resnet50_hawq_policy.json
  compiler:
    backend: tvm
    scope: backbone
    example_batch_size: 1
    example_height: 256
    example_width: 320
    artifact_dir: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/compiler_artifacts
    benchmark_json: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/compiler_benchmark.json
    int8_reference_checkpoint:
    notes: "Compiler-first branch. Start with backbone-only before any detector hybrid integration. INT8 is currently benchmarked via an eager reference path until a real compiler runtime is attached."
  phase_learning_rates:
    weight_only: 0.0001
    full: 0.00005
    frozen: 0.00001
  variant_modules:
    M0: []
    M1: [backbone.resnet50]
    M2: [backbone.resnet50, backbone.fpn]
    M3: [backbone.resnet50, backbone.fpn, rpn.shared_conv, rpn.classification]
    M4: [backbone.resnet50, backbone.fpn, rpn.shared_conv, rpn.classification, rpn.bbox]
  quantized_modules:
    - backbone.body
  fp32_modules:
    - transform
    - anchor_generator
    - rpn.bbox_decoder_nms
    - rpn.bbox_branch
    - roi_align
    - roi_heads
    - final_decode_nms

output:
  directory: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler
  fp32_best: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/fp32_best.pt
  fp32_last: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/fp32_last.pt
  qat_best: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/qat_best.pt
  qat_last: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/qat_last.pt
  int8_model: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/selective_int8.pt
  evaluation_json: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/evaluation.json
  benchmark_json: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/benchmark.json
  epoch_benchmarks: /content/drive/MyDrive/EchteAI/seadronessee_resnet50_hawq_compiler/epoch_benchmarks.json

benchmark:
  warmup_iterations: 10
  iterations: 50
  num_threads: 1
